name: Build Signed AAB
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Java Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK Kur
        uses: android-actions/setup-android@v3
      - name: Android 34 Platform Kur
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Bağımlılıkları Yükle
        run: npm install
      - name: Android Platform Ekle
        run: npx cap add android
      - name: API Düzeyi Güncelle
        run: |
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' android/variables.gradle
      - name: Capacitor Sync
        run: npx cap sync android
      - name: Keystore Oluştur
        run: |
          keytool -genkey -v \
            -keystore $GITHUB_WORKSPACE/release.keystore \
            -alias onequestion \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass onequestion2024 \
            -keypass onequestion2024 \
            -dname "CN=One Question, OU=App, O=OneQuestion, L=Istanbul, ST=Istanbul, C=TR"
      - name: AAB İmzalı Derle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=onequestion2024 \
            -Pandroid.injected.signing.key.alias=onequestion \
            -Pandroid.injected.signing.key.password=onequestion2024
      - name: AAB İndir
        uses: actions/upload-artifact@v4
        with:
          name: app-signed
          path: android/app/build/outputs/bundle/release/app-release.aab

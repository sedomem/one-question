name: Build Signed Android AAB

on:
  workflow_dispatch: # Manuel olarak tetiklemek için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          # Eğer www klasörü yoksa oluştur (Capacitor hata vermemesi için)
          mkdir -p www

      - name: Capacitor Sync & Add Platform
        run: |
          # Eğer android klasörü yoksa ekle, varsa sadece senkronize et
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Keystore'u Çöz ve Hazırla
        # GitHub Secrets'taki Base64 metnini tekrar dosyaya çevirir
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Android AAB (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        # Oluşan AAB dosyasını senin sabit anahtarınla imzalar
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore release.keystore \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            android/app/build/outputs/bundle/release/app-release-unsigned.aab ${{ secrets.KEY_ALIAS }}
          
          # Dosyayı imzalanmış olarak yeniden adlandır
          mv android/app/build/outputs/bundle/release/app-release-unsigned.aab android/app/build/outputs/bundle/release/one-question-signed.aab

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: one-question-signed-aab
          path: android/app/build/outputs/bundle/release/one-question-signed.aab

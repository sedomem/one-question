name: Build Signed Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          mkdir -p www

      - name: Capacitor Sync & Add Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Keystore'u Hazırla (Gelişmiş)
        run: |
          # Secret'ı temizleyip ignore-garbage (-i) flag'i ile güvenli şekilde çözüyoruz
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 -d -i > release.keystore
          
          if [ ! -s release.keystore ]; then
            echo "HATA: KEYSTORE_BASE64 secret'ı boş veya hatalı!"
            exit 1
          fi
          ls -lh release.keystore

      - name: Build Android AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            android/app/build/outputs/bundle/release/app-release-unsigned.aab \
            "${{ secrets.KEY_ALIAS }}"
          
          mv android/app/build/outputs/bundle/release/app-release-unsigned.aab android/app/build/outputs/bundle/release/one-question-signed.aab

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: one-question-signed-aab
          path: android/app/build/outputs/bundle/release/one-question-signed.aab
